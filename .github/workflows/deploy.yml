name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Build & push images ─────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: backend
            dockerfile: backend/Dockerfile
            image_suffix: api
          - context: backend
            dockerfile: backend/Dockerfile.worker
            image_suffix: worker
          - context: frontend
            dockerfile: frontend/Dockerfile
            image_suffix: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}:latest

  # ── Deploy to staging ───────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Run staging migrations
        env:
          STAGING_MIGRATE_WEBHOOK_URL: ${{ secrets.STAGING_MIGRATE_WEBHOOK_URL }}
        run: |
          test -n "$STAGING_MIGRATE_WEBHOOK_URL"
          curl -fsSL -X POST "$STAGING_MIGRATE_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}","ref":"${{ github.ref_name }}"}'
      - name: Deploy staging release
        env:
          STAGING_DEPLOY_WEBHOOK_URL: ${{ secrets.STAGING_DEPLOY_WEBHOOK_URL }}
        run: |
          test -n "$STAGING_DEPLOY_WEBHOOK_URL"
          curl -fsSL -X POST "$STAGING_DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}","ref":"${{ github.ref_name }}"}'
      - name: Staging smoke test
        env:
          STAGING_HEALTHCHECK_URL: ${{ secrets.STAGING_HEALTHCHECK_URL }}
        run: |
          test -n "$STAGING_HEALTHCHECK_URL"
          curl -fsS "$STAGING_HEALTHCHECK_URL/api/v1/health/ready"

  # ── Deploy to production (tag only) ─────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Run production migrations
        env:
          PRODUCTION_MIGRATE_WEBHOOK_URL: ${{ secrets.PRODUCTION_MIGRATE_WEBHOOK_URL }}
        run: |
          test -n "$PRODUCTION_MIGRATE_WEBHOOK_URL"
          curl -fsSL -X POST "$PRODUCTION_MIGRATE_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}","tag":"${{ github.ref_name }}"}'
      - name: Deploy production release
        env:
          PRODUCTION_DEPLOY_WEBHOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_WEBHOOK_URL }}
        run: |
          test -n "$PRODUCTION_DEPLOY_WEBHOOK_URL"
          curl -fsSL -X POST "$PRODUCTION_DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}","tag":"${{ github.ref_name }}"}'
      - name: Production smoke test
        env:
          PRODUCTION_HEALTHCHECK_URL: ${{ secrets.PRODUCTION_HEALTHCHECK_URL }}
        run: |
          test -n "$PRODUCTION_HEALTHCHECK_URL"
          curl -fsS "$PRODUCTION_HEALTHCHECK_URL/api/v1/health/ready"
