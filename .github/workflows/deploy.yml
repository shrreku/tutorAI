name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: backend
            dockerfile: backend/Dockerfile
            image_suffix: api
          - context: backend
            dockerfile: backend/Dockerfile.worker
            image_suffix: worker
    steps:
      - uses: actions/checkout@v4
      - name: Derive lowercase image prefix
        id: image-prefix
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-${{ matrix.image_suffix }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-${{ matrix.image_suffix }}:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy staging backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_PREFIX: ${{ github.repository }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: APP_IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,IMAGE_PREFIX,DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            git fetch --all --tags --prune
            git checkout "$APP_IMAGE_TAG"
            chmod +x scripts/deploy_remote.sh
            ./scripts/deploy_remote.sh
  deploy-production-backend:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy production backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_PREFIX: ${{ github.repository }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: APP_IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,IMAGE_PREFIX,DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            git fetch --all --tags --prune
            git checkout "$APP_IMAGE_TAG"
            chmod +x scripts/deploy_remote.sh
            ./scripts/deploy_remote.sh
  deploy-production-frontend:
    runs-on: ubuntu-latest
    needs: deploy-production-backend
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend for production
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.PRODUCTION_FRONTEND_API_BASE_URL }}
        run: npm run build
      - name: Deploy frontend to Cloudflare
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc
