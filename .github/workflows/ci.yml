name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Secret scanning & lint ──────────────────────────────────────
  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m ruff check app/ tests/
      - run: python -m ruff format --check app/ tests/

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  # ── Backend tests ───────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    needs: [lint-backend]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studyagent_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/studyagent_test
      REDIS_URL: redis://localhost:6379/0
      AUTH_ENABLED: "false"
      LLM_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Docker build verification ───────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f backend/Dockerfile backend/ -t studyagent-api:ci
      - name: Build Worker image
        run: docker build -f backend/Dockerfile.worker backend/ -t studyagent-worker:ci
      - name: Build Frontend image
        run: docker build -f frontend/Dockerfile frontend/ -t studyagent-frontend:ci
