services:
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?set IMAGE_PREFIX}-api:${APP_IMAGE_TAG:-latest}
    env_file:
      - ./backend/deploy.env
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  worker:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?set IMAGE_PREFIX}-worker:${APP_IMAGE_TAG:-latest}
    env_file:
      - ./backend/deploy.env
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    volumes:
      - backend_storage:/app/storage

  migrate:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:?set IMAGE_PREFIX}-api:${APP_IMAGE_TAG:-latest}
    env_file:
      - ./backend/deploy.env
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    volumes:
      - backend_storage:/app/storage

volumes:
  backend_storage:
